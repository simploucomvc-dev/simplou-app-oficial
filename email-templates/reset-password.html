<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha – Simplou</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8f9fa;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif;
            color: #1a1a2e;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 560px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        .header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .logo {
            height: 48px;
            width: auto;
        }

        .body {
            padding: 20px 40px 40px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            text-align: center;
        }

        .text {
            font-size: 16px;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: center;
        }

        .otp-wrapper {
            background: #f7fee7;
            border: 2px solid #A3E635;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-bottom: 30px;
        }

        .otp-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #5B9F00;
            margin-bottom: 12px;
        }

        .otp-code {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
        }

        .footer {
            background: #ffffff;
            border-top: 1px solid #f1f5f9;
            padding: 30px 40px;
            text-align: center;
        }

        .footer p {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .footer a {
            color: #A3E635;
            text-decoration: none;
            font-weight: 600;
        }

        .brand-footer {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="header">
            <img src="https://bjhrbvzpkjgstgpmbtuc.supabase.co/storage/v1/object/public/images-simplou/simplou-logo-mobile.png"
                alt="Simplou" class="logo" />
        </div>
        <div class="body">
            <h1 class="title">Recupere sua senha</h1>
            <p class="text">Recebemos um pedido para redefinir sua senha. Se foi você, utilize o código de segurança
                abaixo:</p>
            <div class="otp-wrapper">
                <div class="otp-label">Código de redefinição</div>
                <div class="otp-code">{{ .Token }}</div>
            </div>
            <p class="text" style="font-size: 14px;">Caso não tenha solicitado a alteração, ignore este e-mail.</p>
        </div>
        <div class="footer">
            <span class="brand-footer">Simplou</span>
            <p>Simplificando sua jornada empreendedora.<br /><a href="https://app.simplou.com.br">app.simplou.com.br</a>
            </p>
        </div>
    </div>
</body>

</html>
